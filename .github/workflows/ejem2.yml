name: CI/CD EJEMPLO

on:
  push:
    branches: [main]

jobs:
  build-angular:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: npm install

      - name: Build app
        run: npm run build

  job2:
    runs-on: ubuntu-latest
    steps:
      - name: Simular fallo
        run: exit 1   

  deploy-angular:
    runs-on: ubuntu-latest
    needs:
      - build-angular
      - job2
    if: ${{ always() }} # uso del always
    steps:
      - name: Mostrar estado de jobs anteriores
        run: |
          echo "build-angular: ${{ needs.build-angular.result }}"
          echo "job2: ${{ needs.job2.result }}"

      - name: Deploy (aunque falle algo)
        run: echo "Intentando deploy..."