name: Matrix Demo PRO

on:
  workflow_dispatch:

jobs:
  matrix-demo:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [16, 18]
        environment: [staging, prod]

    steps:
      - name: Mostrar combinación
        run: |
          echo "Node version: ${{ matrix.node }}"
          echo "Environment: ${{ matrix.environment }}"

      - name: Simular instalación
        run: echo "Instalando Node ${{ matrix.node }}..."

      - name: Simular tests
        run: echo "Corriendo tests en ${{ matrix.environment }}..."

      - name: Simular deploy
        run: echo "Deploy a ${{ matrix.environment }} con Node ${{ matrix.node }}"