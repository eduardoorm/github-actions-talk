name: CI Demo

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
            node-version: ${{ matrix.node-version }}


      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test   # 👈 solo si TODOS los tests pasan
    if: github.ref == 'refs/heads/master'
    env:
      FIREBASE_AVAILABLE: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}

    steps:
      - name: Sin secret configurado
        if: env.FIREBASE_AVAILABLE != 'true'
        run: |
          echo "⚠️  FIREBASE_SERVICE_ACCOUNT no configurado."
          echo "Agrega el secret en Settings > Secrets para habilitar el deploy."

      - uses: actions/checkout@v3
        if: env.FIREBASE_AVAILABLE == 'true'

      - name: Deploy to Firebase
        if: env.FIREBASE_AVAILABLE == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.SECRET_GITHUB }}
          channelId: live
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: fire-conference-eormeno