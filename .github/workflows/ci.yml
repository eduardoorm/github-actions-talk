name: CI Demo

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16, 18, 20]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
            node-version: ${{ matrix.node-version }}


      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test