name: Advanced Manual Run

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Ambiente"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

      version:
        description: "Versión"
        required: true

      run_tests:
        description: "¿Ejecutar tests?"
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Mostrar datos
        run: |
          echo "Env: ${{ github.event.inputs.env }}"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Run tests: ${{ github.event.inputs.run_tests }}"